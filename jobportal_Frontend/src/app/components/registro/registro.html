<div class="auth-wrapper">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card auth-card shadow-lg">
          <div class="card-body p-4 p-md-5">

            <div class="text-center mb-4">
              <h2 class="fw-bold mb-1" style="font-size:1.8rem">
                <span style="color:#2563eb">Post</span><span style="color:#64748b">&</span><span style="color:#7c3aed">Find</span>
              </h2>
              <p class="text-muted mb-0">Crea tu cuenta gratuita</p>
            </div>

            <!-- Error general del servidor -->
            <div class="alert alert-danger py-2 small d-flex align-items-center gap-2" *ngIf="errors.general">
              <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
              <span>{{ errors.general }}</span>
            </div>

            <form (ngSubmit)="onSubmit()" novalidate>

              <!-- Tipo de cuenta -->
              <div class="mb-4">
                <label class="form-label fw-semibold small text-uppercase text-muted">Tipo de cuenta *</label>
                <div class="row g-2">
                  <div class="col-6">
                    <label class="d-block p-3 rounded-3 border text-center" style="cursor:pointer"
                      [style.border-color]="form.role==='TRABAJADOR' ? '#2563eb' : ''"
                      [style.border-width]="form.role==='TRABAJADOR' ? '2px' : '1px'"
                      [style.background]="form.role==='TRABAJADOR' ? '#eff6ff' : '#fff'">
                      <input type="radio" name="role" value="TRABAJADOR" [(ngModel)]="form.role" class="d-none">
                      <i class="bi bi-person-badge d-block mb-1" style="font-size:1.5rem"
                        [style.color]="form.role==='TRABAJADOR' ? '#2563eb' : '#94a3b8'"></i>
                      <span class="fw-semibold small" [style.color]="form.role==='TRABAJADOR' ? '#2563eb' : '#64748b'">Trabajador</span>
                    </label>
                  </div>
                  <div class="col-6">
                    <label class="d-block p-3 rounded-3 border text-center" style="cursor:pointer"
                      [style.border-color]="form.role==='EMPRESARIO' ? '#7c3aed' : ''"
                      [style.border-width]="form.role==='EMPRESARIO' ? '2px' : '1px'"
                      [style.background]="form.role==='EMPRESARIO' ? '#f5f3ff' : '#fff'">
                      <input type="radio" name="role" value="EMPRESARIO" [(ngModel)]="form.role" class="d-none">
                      <i class="bi bi-building d-block mb-1" style="font-size:1.5rem"
                        [style.color]="form.role==='EMPRESARIO' ? '#7c3aed' : '#94a3b8'"></i>
                      <span class="fw-semibold small" [style.color]="form.role==='EMPRESARIO' ? '#7c3aed' : '#64748b'">Empresario</span>
                    </label>
                  </div>
                </div>
              </div>

              <!-- Nombre completo -->
              <div class="mb-3">
                <label class="form-label fw-semibold small">Nombre completo</label>
                <input type="text" class="form-control" [(ngModel)]="form.fullName" name="fullName"
                  placeholder="Ej: Juan García">
              </div>

              <!-- Empresa (solo EMPRESARIO) -->
              <div class="mb-3" *ngIf="form.role==='EMPRESARIO'">
                <label class="form-label fw-semibold small">Empresa *</label>
                <div class="input-group">
                  <span class="input-group-text" [class.border-danger]="errors.company">
                    <i class="bi bi-building"></i>
                  </span>
                  <input type="text" class="form-control" [class.is-invalid]="errors.company"
                    [(ngModel)]="form.company" name="company" placeholder="Nombre de la empresa"
                    (input)="errors.company = undefined">
                </div>
                <div class="invalid-feedback d-block" *ngIf="errors.company">
                  <i class="bi bi-exclamation-circle me-1"></i>{{ errors.company }}
                </div>
              </div>

              <!-- Usuario -->
              <div class="mb-3">
                <label class="form-label fw-semibold small">Usuario *</label>
                <div class="input-group">
                  <span class="input-group-text" [class.border-danger]="errors.username">
                    <i class="bi bi-at"></i>
                  </span>
                  <input type="text" class="form-control" [class.is-invalid]="errors.username"
                    [(ngModel)]="form.username" name="username" placeholder="nombreusuario"
                    (input)="errors.username = undefined">
                </div>
                <div class="invalid-feedback d-block" *ngIf="errors.username">
                  <i class="bi bi-exclamation-circle me-1"></i>{{ errors.username }}
                </div>
              </div>

              <!-- Email -->
              <div class="mb-3">
                <label class="form-label fw-semibold small">Email *</label>
                <div class="input-group">
                  <span class="input-group-text" [class.border-danger]="errors.email">
                    <i class="bi bi-envelope"></i>
                  </span>
                  <input type="email" class="form-control" [class.is-invalid]="errors.email"
                    [(ngModel)]="form.email" name="email" placeholder="tu@email.com"
                    (input)="errors.email = undefined">
                </div>
                <div class="invalid-feedback d-block" *ngIf="errors.email">
                  <i class="bi bi-exclamation-circle me-1"></i>{{ errors.email }}
                </div>
              </div>

              <!-- Contraseña -->
              <div class="mb-4">
                <label class="form-label fw-semibold small">Contraseña *</label>
                <div class="input-group">
                  <span class="input-group-text" [class.border-danger]="errors.password">
                    <i class="bi bi-lock"></i>
                  </span>
                  <input type="password" class="form-control" [class.is-invalid]="errors.password"
                    [(ngModel)]="form.password" name="password" placeholder="Mínimo 6 caracteres"
                    (input)="errors.password = undefined">
                </div>
                <div class="invalid-feedback d-block" *ngIf="errors.password">
                  <i class="bi bi-exclamation-circle me-1"></i>{{ errors.password }}
                </div>
              </div>

              <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" [disabled]="loading">
                <span class="spinner-border spinner-border-sm me-2" *ngIf="loading"></span>
                <i class="bi bi-person-plus-fill me-2" *ngIf="!loading"></i>
                {{ loading ? 'Creando cuenta...' : 'Crear cuenta' }}
              </button>

            </form>

            <hr class="my-4">
            <p class="text-center text-muted small mb-0">
              ¿Ya tienes cuenta?
              <a routerLink="/login" class="text-primary fw-semibold">Inicia sesión aquí</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
