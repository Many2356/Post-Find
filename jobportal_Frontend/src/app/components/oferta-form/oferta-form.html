<div style="min-height:100vh;background:#f1f5f9">

  <!-- Header -->
  <div style="background:linear-gradient(135deg,#0f172a,#1e3a5f);padding:2rem 0">
    <div class="container">
      <a [routerLink]="['/ofertas']" class="text-decoration-none mb-2 d-inline-block" style="color:#94a3b8;font-size:.9rem">
        <i class="bi bi-arrow-left me-1"></i>Volver a ofertas
      </a>
      <h1 class="fw-bold text-white mb-0" style="font-size:1.8rem">
        <i [class]="'bi me-2 ' + (isEdit ? 'bi-pencil-fill' : 'bi-plus-circle-fill')" style="color:#60a5fa"></i>
        {{ isEdit ? 'Editar oferta' : 'Publicar nueva oferta' }}
      </h1>
    </div>
  </div>

  <div class="container py-4">

    <!-- Cargando datos -->
    <div class="text-center py-5" *ngIf="loadingData">
      <div class="spinner-border text-primary"></div>
      <p class="text-muted mt-2">Cargando oferta...</p>
    </div>

    <div class="row justify-content-center" *ngIf="!loadingData">
      <div class="col-lg-8">

        <!-- Error general del servidor -->
        <div class="alert alert-danger d-flex align-items-center gap-2 mb-4" *ngIf="errors.general">
          <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
          <span>{{ errors.general }}</span>
        </div>

        <form (ngSubmit)="onSubmit()" novalidate>

          <!-- Información básica -->
          <div class="card p-4 mb-4">
            <h5 class="fw-bold mb-4">
              <i class="bi bi-info-circle me-2 text-primary"></i>Información básica
            </h5>

            <!-- Título -->
            <div class="mb-3">
              <label class="form-label fw-semibold small">Título del puesto *</label>
              <input type="text" class="form-control" [class.is-invalid]="errors.title"
                [(ngModel)]="form.title" name="title"
                placeholder="Ej: Desarrollador Angular Senior"
                (input)="errors.title = undefined">
              <div class="invalid-feedback" *ngIf="errors.title">
                <i class="bi bi-exclamation-circle me-1"></i>{{ errors.title }}
              </div>
            </div>

            <div class="row g-3">

              <!-- Empresa -->
              <div class="col-md-6">
                <label class="form-label fw-semibold small">Empresa *</label>
                <input type="text" class="form-control" [class.is-invalid]="errors.company"
                  [(ngModel)]="form.company" name="company"
                  placeholder="Nombre de la empresa"
                  (input)="errors.company = undefined">
                <div class="invalid-feedback" *ngIf="errors.company">
                  <i class="bi bi-exclamation-circle me-1"></i>{{ errors.company }}
                </div>
              </div>

              <!-- Ubicación -->
              <div class="col-md-6">
                <label class="form-label fw-semibold small">Ubicación</label>
                <input type="text" class="form-control" [(ngModel)]="form.location" name="location"
                  placeholder="Ej: Madrid, España">
              </div>

              <!-- Salario -->
              <div class="col-md-6">
                <label class="form-label fw-semibold small">Salario</label>
                <input type="text" class="form-control" [(ngModel)]="form.salary" name="salary"
                  placeholder="Ej: 35.000 - 45.000 €/año">
              </div>

              <!-- Modalidad -->
              <div class="col-md-6">
                <label class="form-label fw-semibold small">Modalidad</label>
                <select class="form-select" [(ngModel)]="form.remote" name="remote">
                  <option value="">Seleccionar...</option>
                  <option *ngFor="let o of remoteOptions" [value]="o">{{ o }}</option>
                </select>
              </div>

              <!-- Tipo de contrato -->
              <div class="col-md-6">
                <label class="form-label fw-semibold small">Tipo de contrato</label>
                <select class="form-select" [(ngModel)]="form.contractType" name="contractType">
                  <option value="">Seleccionar...</option>
                  <option *ngFor="let c of contractTypes" [value]="c">{{ c }}</option>
                </select>
              </div>

              <!-- Nivel de experiencia -->
              <div class="col-md-6">
                <label class="form-label fw-semibold small">Nivel de experiencia</label>
                <select class="form-select" [(ngModel)]="form.experienceLevel" name="experienceLevel">
                  <option value="">Seleccionar...</option>
                  <option *ngFor="let e of experienceLevels" [value]="e">{{ e }}</option>
                </select>
              </div>

            </div>
          </div>

          <!-- Descripción -->
          <div class="card p-4 mb-4">
            <h5 class="fw-bold mb-3">
              <i class="bi bi-file-text me-2 text-primary"></i>Descripción del puesto
            </h5>
            <textarea class="form-control" rows="8" [(ngModel)]="form.description" name="description"
              placeholder="Describe las responsabilidades, requisitos, beneficios..."></textarea>
          </div>

          <!-- Tecnologías -->
          <div class="card p-4 mb-4">
            <h5 class="fw-bold mb-3">
              <i class="bi bi-code-slash me-2 text-primary"></i>Tecnologías requeridas
            </h5>
            <input type="text" class="form-control" [(ngModel)]="form.technologies" name="technologies"
              placeholder="Ej: Angular, Spring Boot, MySQL, Docker (separadas por comas)">
            <div class="form-text">Separa las tecnologías con comas</div>
          </div>

          <!-- Botones -->
          <div class="d-flex gap-3 justify-content-end">
            <button type="button" class="btn btn-outline-secondary px-4" (click)="cancelar()" [disabled]="loading">
              Cancelar
            </button>
            <button type="submit" class="btn btn-primary px-5 py-2 fw-semibold" [disabled]="loading">
              <span class="spinner-border spinner-border-sm me-2" *ngIf="loading"></span>
              <i class="bi bi-check-lg me-2" *ngIf="!loading"></i>
              {{ loading ? 'Guardando...' : (isEdit ? 'Guardar cambios' : 'Publicar oferta') }}
            </button>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
